[build]
  command = "npm run build"
  publish = ".next"

# Required for Next.js 14 API routes and SSR on Netlify.
# Netlify auto-installs this — no npm install needed.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Cache: immutable Next.js chunks ─────────────────────────────────────────
# Content-hashed filenames — safe to cache forever.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache: user media ────────────────────────────────────────────────────────
# Only changes on redeploy. Long TTL is fine.
[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/music/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# ─── Cache: static assets ─────────────────────────────────────────────────────
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Security headers (all routes) ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options  = "nosniff"
    X-Frame-Options         = "DENY"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"

# ─── API routes: no indexing, no caching by intermediaries ───────────────────
# The routes themselves set Cache-Control; this adds the crawler hint.
[[headers]]
  for = "/api/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
